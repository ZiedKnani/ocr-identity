services:
  # Service OCR principal
  ocr-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ocr-identity-api
    image: ocr-identity-extractor:2.0.0
    restart: unless-stopped
    
    ports:
      - "8000:8000"  # Port API
    
    environment:
      # Configuration Python
      - PYTHONUNBUFFERED=1
      
      # Configuration de l'application (optionnel)
      - LOG_LEVEL=INFO
      - MAX_WORKERS=4
      - OCR_LANGUAGE=fr
      - SMB_USERNAME=${SMB_USERNAME:-}
      - SMB_PASSWORD=${SMB_PASSWORD:-}
      - SMB_DOMAIN=${SMB_DOMAIN:-}
    
    volumes:
      # Volume pour les logs (optionnel)
      - ./logs:/app/logs
      
      # Volume pour le cache des modèles PaddleOCR
      - paddle-models:/home/ocruser/.paddleocr
      
      # Volume pour uploader des fichiers tests (optionnel)
      - ./test_images:/app/test_images:ro
    
    networks:
      - ocr-network
    
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 300s
      timeout: 10s
      retries: 3
      start_period: 40s
      disable: false
    
    # Limites de ressources
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
        reservations:
          cpus: '1.0'
          memory: 2G

  # Service Nginx (optionnel - reverse proxy)
  nginx:
    image: nginx:alpine
    container_name: ocr-nginx
    restart: unless-stopped
    
    ports:
      - "80:80"
      - "443:443"
    
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro  # Certificats SSL (si HTTPS)
    
    depends_on:
      - ocr-api
    
    networks:
      - ocr-network
    
    profiles:
      - production  # Activé uniquement en production

# Volumes nommés
volumes:
  paddle-models:
    driver: local
    name: ocr-paddle-models

# Réseau personnalisé
networks:
  ocr-network:
    driver: bridge
    name: ocr-network
