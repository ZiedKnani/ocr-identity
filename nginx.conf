# nginx.conf - Configuration Nginx pour reverse proxy

events {
    worker_connections 1024;
}

http {
    # Configuration de base
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 20M;  # Taille max fichiers uploadés

    # MIME types
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript 
               application/json application/javascript application/xml+rss;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

    # Upstream vers l'API OCR
    upstream ocr_api {
        server ocr-api:8000;
    }

    # Serveur HTTP
    server {
        listen 80;
        server_name localhost;

        # Redirect vers HTTPS (en production)
        # return 301 https://$server_name$request_uri;

        # API OCR
        location / {
            # Rate limiting
            limit_req zone=api_limit burst=20 nodelay;

            # Proxy headers
            proxy_pass http://ocr_api;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Timeouts
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;

            # Cache bypass
            proxy_cache_bypass $http_upgrade;
        }

        # Health check endpoint
        location /health {
            proxy_pass http://ocr_api/health;
            access_log off;
        }

        # Documentation FastAPI
        location /docs {
            proxy_pass http://ocr_api/docs;
        }

        location /redoc {
            proxy_pass http://ocr_api/redoc;
        }
    }

    # Serveur HTTPS (optionnel)
    # server {
    #     listen 443 ssl http2;
    #     server_name localhost;
    #
    #     # Certificats SSL
    #     ssl_certificate /etc/nginx/ssl/cert.pem;
    #     ssl_certificate_key /etc/nginx/ssl/key.pem;
    #
    #     # Configuration SSL
    #     ssl_protocols TLSv1.2 TLSv1.3;
    #     ssl_ciphers HIGH:!aNULL:!MD5;
    #     ssl_prefer_server_ciphers on;
    #
    #     # Même configuration location que HTTP
    #     location / {
    #         proxy_pass http://ocr_api;
    #         # ... (mêmes configurations proxy)
    #     }
    # }
}
